<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortinetic Solutions</title>

<style>
body{
  margin:0;
  overflow-x:hidden;
  font-family: 'Segoe UI', sans-serif;
  color:white;
  background:#020617;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

section{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-size:3rem;
}

p{
  max-width:600px;
  color:#94a3b8;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<section>
  <div>
    <h1>Fortinetic Solutions</h1>
    <p>Engineering next-gen cloud & DevOps infrastructure</p>
  </div>
</section>

<section>
  <div>
    <h1>Services</h1>
    <p>Cloud • DevOps • Monitoring • Security</p>
  </div>
</section>

<section>
  <div>
    <h1>Why Us</h1>
    <p>Scalable, secure, enterprise-grade systems</p>
  </div>
</section>

<section>
  <div>
    <h1>Contact</h1>
    <p>info@fortineticsolutions.in</p>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
const canvas = document.querySelector('#bg');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({
  canvas:canvas,
});
renderer.setSize(window.innerWidth, window.innerHeight);

// LIGHTS
const light1 = new THREE.PointLight(0x3b82f6,1);
light1.position.set(20,20,20);

const light2 = new THREE.PointLight(0x22c55e,1);
light2.position.set(-20,-20,20);

scene.add(light1, light2);

// OBJECT 1 (TORUS)
const torusGeo = new THREE.TorusKnotGeometry(10,3,100,16);
const torusMat = new THREE.MeshStandardMaterial({
  color:0x3b82f6,
  wireframe:true
});
const torus = new THREE.Mesh(torusGeo, torusMat);
scene.add(torus);

// OBJECT 2 (SPHERE)
const sphereGeo = new THREE.SphereGeometry(5,32,32);
const sphereMat = new THREE.MeshStandardMaterial({
  color:0x22c55e,
  wireframe:true
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.x = 20;
scene.add(sphere);

// OBJECT 3 (BOX)
const boxGeo = new THREE.BoxGeometry(6,6,6);
const boxMat = new THREE.MeshStandardMaterial({
  color:0xffffff,
  wireframe:true
});
const cube = new THREE.Mesh(boxGeo, boxMat);
cube.position.x = -20;
scene.add(cube);

// PARTICLES
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 500;

const posArray = new Float32Array(particlesCount * 3);

for(let i=0;i<particlesCount*3;i++){
  posArray[i] = (Math.random() - 0.5) * 100;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray,3));

const particlesMaterial = new THREE.PointsMaterial({
  size:0.2
});

const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// CAMERA
camera.position.z = 30;

// SCROLL EFFECT
document.body.onscroll = () => {
  const t = document.body.getBoundingClientRect().top;

  torus.rotation.x += 0.05;
  sphere.rotation.y += 0.05;
  cube.rotation.z += 0.05;

  camera.position.z = 30 + t * -0.02;
};

// MOUSE EFFECT
document.addEventListener('mousemove', (e)=>{
  const x = (e.clientX/window.innerWidth - 0.5) * 2;
  const y = (e.clientY/window.innerHeight - 0.5) * 2;

  scene.rotation.y = x * 0.3;
  scene.rotation.x = y * 0.3;
});

// ANIMATION LOOP
function animate(){
  requestAnimationFrame(animate);

  torus.rotation.x += 0.003;
  torus.rotation.y += 0.003;

  sphere.rotation.y += 0.002;
  cube.rotation.x += 0.002;

  particlesMesh.rotation.y += 0.0005;

  renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
